# ── Identity ──────────────────────────────────────────────────────────────────

# -- Name of the `AnsibleAutomationPlatform` CR. Must be unique per namespace.
name: aap

# -- Target namespace for the CR. **Required.**
namespace: ""  # REQUIRED

# ── Global ────────────────────────────────────────────────────────────────────

# -- Image pull policy applied to all AAP component images. One of `Always`, `Never`, `IfNotPresent`.
image_pull_policy: IfNotPresent

# -- List of Secret names for pulling images from private registries.
image_pull_secrets: []

# -- Suppress sensitive output in operator logs.
no_log: true

# -- Set `true` to mark this instance as passive (active-passive failover).
# `false` is the operator default and is intentionally omitted from the rendered CR —
# setting this to `false` explicitly has no effect.
idle_aap: false

# -- Redis deployment mode. One of `standalone`, `cluster`.
redis_mode: standalone

# ── Images ────────────────────────────────────────────────────────────────────

# -- Override the operator-default Gateway image. Leave empty to use the operator default.
image: ""
# -- Override the operator-default Gateway image tag.
image_version: ""
# -- Override the operator-default PostgreSQL image.
postgres_image: ""
# -- Override the operator-default PostgreSQL image tag.
postgres_image_version: ""
# -- Override the operator-default Redis image.
redis_image: ""
# -- Override the operator-default Redis image tag.
redis_image_version: ""

# ── Registry ──────────────────────────────────────────────────────────────────

# -- Override the default Red Hat registry (`registry.redhat.io`).
redhat_registry: ""
# -- Override the default registry namespace.
redhat_registry_ns: ""

# ── Secrets ───────────────────────────────────────────────────────────────────

# -- Name of an existing Secret containing the `password` key — operator sets the admin password from it.
admin_password_secret: ""
# -- Name of a Secret containing a custom CA bundle for TLS verification.
bundle_cacert_secret: ""
# -- Name of a Secret for database field-level encryption key.
db_fields_encryption_secret: ""

# ── Networking ────────────────────────────────────────────────────────────────

# -- Public hostname for the AAP Gateway UI (e.g. `aap.apps.cluster.example.com`). Optional — operator auto-generates a route hostname if omitted.
hostname: ""

# -- Override the public base URL if different from hostname.
public_base_url: ""

# -- Route TLS termination mechanism. One of `Edge`, `Passthrough`.
route_tls_termination_mechanism: Edge
# -- Name of the TLS Secret for the Route. Operator generates a cert if omitted.
route_tls_secret: ""
# -- Explicit route hostname (alternative to `hostname`).
route_host: ""
# -- Annotations to add to the Route object.
route_annotations: {}

# -- Set to `ingress` to use Kubernetes Ingress instead of an OpenShift Route.
ingress_type: ""
# -- Ingress class name (e.g. `nginx`).
ingress_class_name: ""
# -- Ingress path (e.g. `/`).
ingress_path: ""
# -- Ingress path type. One of `Prefix`, `Exact`, `ImplementationSpecific`.
ingress_path_type: ""
# -- Name of the TLS Secret for Ingress.
ingress_tls_secret: ""
# -- Annotations to add to the Ingress object.
ingress_annotations: {}

# -- Service type. One of `ClusterIP`, `NodePort`, `LoadBalancer`.
service_type: ""
# -- Annotations to add to the Service.
service_annotations: {}
# -- Annotations to add to the ServiceAccount.
service_account_annotations: {}

# -- LoadBalancer port. Only used when `service_type=LoadBalancer`.
loadbalancer_port: 443
# -- LoadBalancer protocol. One of `http`, `https`. Only used when `service_type=LoadBalancer`.
loadbalancer_protocol: https

# ── Gateway API pods ──────────────────────────────────────────────────────────

api:
  # -- Number of Gateway API pod replicas.
  replicas: 1
  # -- Python logging level. One of `DEBUG`, `INFO`, `WARNING`, `ERROR`, `CRITICAL`.
  log_level: INFO
  # -- CPU/memory requests and limits for Gateway API pods.
  resource_requirements:
    requests:
      cpu: ""
      memory: ""
    limits:
      cpu: ""
      memory: ""
  # -- Node selector for Gateway API pods.
  node_selector: {}
  # -- Tolerations for Gateway API pods.
  tolerations: []
  # -- Topology spread constraints for Gateway API pods.
  topology_spread_constraints: []
  # -- Deployment update strategy.
  strategy: {}

# ── Gateway Database ──────────────────────────────────────────────────────────

database:
  # -- Name of an existing Secret with external DB connection info (`host`, `port`, `database`, `username`, `password`). If set, the operator skips deploying PostgreSQL.
  database_secret: ""
  # -- StorageClass for the database PVC (internal DB only).
  postgres_storage_class: ""
  # -- PostgreSQL SSL mode. One of `disable`, `require`, `verify-ca`, `verify-full`.
  postgres_ssl_mode: ""
  # -- Run an initContainer to set correct PVC permissions.
  postgres_data_volume_init: false
  # -- Retain the database PVC across operator upgrades.
  postgres_keep_pvc_after_upgrade: false
  # -- Additional shell commands to run in the database init container.
  postgres_init_container_commands: ""
  # -- Extra PostgreSQL configuration settings. Each item: `{setting: "name", value: "value"}`.
  postgres_extra_settings: []
  # -- Disable the database when `idle_aap=true` (active-passive).
  idle_disabled: false
  # -- PriorityClass name for the database pod.
  priority_class: ""
  # -- CPU/memory requests and limits for the database pod.
  resource_requirements:
    requests:
      cpu: ""
      memory: ""
    limits:
      cpu: ""
      memory: ""
  # -- Storage size for the database PVC.
  storage_requirements:
    requests:
      storage: ""
    limits:
      storage: ""
  # -- Node selector for the database pod.
  node_selector: {}
  # -- Tolerations for the database pod.
  tolerations: []

# ── Gateway Redis ─────────────────────────────────────────────────────────────

redis:
  # -- Name of an existing Secret for external Redis. If set, the operator skips deploying Redis.
  redis_secret: ""
  # -- Separate external Redis Secret for EDA (if different from the Gateway Redis).
  eda_redis_secret: ""
  # -- Number of Redis pod replicas. Only used in cluster mode.
  replicas: 1
  # -- CPU/memory requests and limits for the Redis pod.
  resource_requirements:
    requests:
      cpu: ""
      memory: ""
    limits:
      cpu: ""
      memory: ""
  # -- Node selector for the Redis pod.
  node_selector: {}
  # -- Tolerations for the Redis pod.
  tolerations: []

# ── Components ────────────────────────────────────────────────────────────────

controller:
  # -- Set `true` to disable AutomationController.
  disabled: false
  # -- Extra settings injected into controller config. Each item: `{setting: "name", value: "value"}`.
  extra_settings: []

eda:
  # -- Set `true` to disable Event-Driven Ansible.
  disabled: false
  # -- URL of the AutomationController. Operator auto-discovers if left empty.
  automation_server_url: ""
  # -- Extra settings injected into EDA config. Each item: `{setting: "name", value: "value"}`.
  extra_settings: []

hub:
  # -- Set `true` to disable Automation Hub.
  disabled: false
  # -- Size of the Hub file storage PVC (e.g. `100Gi`).
  file_storage_size: ""
  # -- PVC access mode. Use `ReadWriteMany` for multi-replica deployments.
  file_storage_access_mode: ""
  # -- StorageClass for the Hub file storage PVC.
  file_storage_storage_class: ""
  content:
    # -- Number of Hub content service replicas.
    replicas: 2
  worker:
    # -- Number of Hub worker replicas.
    replicas: 2

# ── Global escape hatches ─────────────────────────────────────────────────────

# -- Global list of `{setting, value}` pairs for the Gateway.
extra_settings: []

# -- Feature flags passed to the AAP Gateway. Keys **must** start with `FEATURE_`
# (enforced by `helm lint --strict`); values must be booleans.
# Example:
#   feature_flags:
#     FEATURE_SOME_FLAG: true
#     FEATURE_OTHER_FLAG: false
feature_flags: {}

# -- Arbitrary fields deep-merged last into the `AnsibleAutomationPlatform` spec. Nested keys are merged recursively.
extraSpec: {}
