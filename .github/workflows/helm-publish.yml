name: Helm Publish

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - Chart.yaml

concurrency:
  group: helm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Verify values.schema.json is in sync
        run: |
          pip install pyyaml
          python3 hack/gen-schema.py
          if ! git diff --exit-code values.schema.json; then
            echo "::error::values.schema.json is stale. Run 'python3 hack/gen-schema.py' locally and commit the result."
            exit 1
          fi

      - name: Lint examples
        run: |
          for f in examples/*.yaml; do
            helm lint . --strict -f "$f"
          done

      - name: Template render examples
        run: |
          for f in examples/*.yaml; do
            helm template aap-gateway . -f "$f" > /dev/null
          done

  publish:
    name: Publish to Quay
    runs-on: ubuntu-latest
    needs: lint
    environment: quay-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4

      - name: Derive tags from chart version
        id: tags
        run: |
          CHART_VERSION=$(grep '^version:' Chart.yaml | sed 's/version: *//;s/"//g')
          MINOR_TAG=$(echo "$CHART_VERSION" | cut -d. -f1,2)

          echo "chart_version=$CHART_VERSION" >> "$GITHUB_OUTPUT"
          echo "minor_tag=$MINOR_TAG"         >> "$GITHUB_OUTPUT"

          echo "Derived tags — chart: $CHART_VERSION  minor: $MINOR_TAG"

      - name: Log in to Quay
        run: |
          echo "${{ secrets.QUAY_PASSWORD }}" | helm registry login quay.io \
            --username "${{ secrets.QUAY_USERNAME }}" \
            --password-stdin
          echo "${{ secrets.QUAY_PASSWORD }}" | crane auth login quay.io \
            --username "${{ secrets.QUAY_USERNAME }}" \
            --password-stdin

      - name: Package chart
        run: helm package . --version "${{ steps.tags.outputs.chart_version }}"

      - name: Push chart
        run: helm push aap-gateway-*.tgz oci://quay.io/achanoia

      - name: Retag as minor version
        run: |
          crane tag \
            quay.io/achanoia/aap-gateway:${{ steps.tags.outputs.chart_version }} \
            ${{ steps.tags.outputs.minor_tag }}
