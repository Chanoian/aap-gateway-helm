name: Helm Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Lint examples
        run: |
          for f in examples/*.yaml; do
            helm lint . --strict -f "$f"
          done

      - name: Template render examples
        run: |
          for f in examples/*.yaml; do
            helm template aap-gateway . -f "$f" > /dev/null
          done
