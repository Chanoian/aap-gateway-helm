name: Helm Lint

on:
  push:
    branches:
      - main
      - "release-*"
  pull_request:
    branches:
      - main
      - "release-*"

jobs:
  lint:
    name: Lint Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "latest"

      - name: Lint
        run: helm lint . --strict -f ci/test-values.yaml

      - name: Template render
        run: helm template aap-gateway . -f ci/test-values.yaml > /dev/null
