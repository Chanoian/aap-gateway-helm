{{- if eq ((.Values.secretProvider).type) "vso" }}

{{- /* ── Validation ──────────────────────────────────────────────────────── */}}
{{- if not .Values.secretProvider.vso.connection.address }}
  {{- fail "secretProvider.vso.connection.address is required when secretProvider.type=vso" }}
{{- end }}

{{- $vso := .Values.secretProvider.vso }}
{{- $kvType := printf "kv-%s" $vso.kvVersion }}

{{- /* ── Build the secret mapping: key → AAP destination Secret name ─────── */}}
{{- $destNames := dict
    "admin_password_secret"                    .Values.admin_password_secret
    "bundle_cacert_secret"                     .Values.bundle_cacert_secret
    "db_fields_encryption_secret"              .Values.db_fields_encryption_secret
    "database_secret"                          .Values.database.database_secret
    "controller_postgres_configuration_secret" .Values.controller.postgres_configuration_secret
    "eda_database_secret"                      .Values.eda.database.database_secret
    "redis_secret"                             .Values.redis.redis_secret
    "eda_redis_secret"                         .Values.redis.eda_redis_secret
    "route_tls_secret"                         .Values.route_tls_secret
    "ingress_tls_secret"                       .Values.ingress_tls_secret
-}}

{{- /* ── Validate: opted-in secrets must have a destination name ─────────── */}}
{{- if $vso.secrets }}
  {{- range $key, $destName := $destNames }}
    {{- $cfg := index $vso.secrets $key }}
    {{- if and $cfg (index $cfg "mount") (not $destName) }}
      {{- fail (printf "secretProvider.vso.secrets.%s.mount is set but the corresponding AAP secret name field is empty — set it first" $key) }}
    {{- end }}
  {{- end }}
{{- end }}

{{- $connName := printf "%s-vault-connection" .Values.name }}
{{- $authName := printf "%s-vault-auth" .Values.name }}

---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: {{ $connName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aap-gateway.labels" . | nindent 4 }}
spec:
  address: {{ $vso.connection.address }}
  {{- if $vso.connection.vaultNamespace }}
  vaultNamespace: {{ $vso.connection.vaultNamespace }}
  {{- end }}
  skipTLSVerify: {{ $vso.connection.skipTLSVerify }}
  {{- if $vso.connection.caCertSecretRef }}
  caCertSecretRef: {{ $vso.connection.caCertSecretRef }}
  {{- end }}

---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: {{ $authName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aap-gateway.labels" . | nindent 4 }}
spec:
  vaultConnectionRef: {{ $connName }}
  method: appRole
  mount: {{ $vso.auth.appRole.mount }}
  appRole:
    roleId: {{ $vso.auth.appRole.roleId }}
    secretRef: {{ $vso.auth.appRole.secretRef }}

{{- /* ── VaultStaticSecret per opted-in secret ────────────────────────────── */}}
{{- $root := . }}
{{- if $vso.secrets }}
{{- range $key, $destName := $destNames }}
  {{- $cfg := index $vso.secrets $key }}
  {{- if and $cfg (index $cfg "mount") }}
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: {{ $root.Values.name }}-{{ $key | replace "_" "-" }}
  namespace: {{ $root.Values.namespace }}
  labels:
    {{- include "aap-gateway.labels" $root | nindent 4 }}
spec:
  type: {{ $kvType }}
  mount: {{ index $cfg "mount" }}
  path: {{ index $cfg "path" }}
  destination:
    name: {{ $destName }}
    create: true
  vaultAuthRef: {{ $authName }}
  refreshAfter: {{ index $cfg "refreshAfter" | default $vso.refreshAfter }}
  {{- end }}
{{- end }}
{{- end }}

{{- end }}{{- /* end if type == vso */}}
