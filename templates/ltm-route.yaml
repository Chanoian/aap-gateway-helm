{{- if .Values.ltm_route_enabled }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.name }}-ltm
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aap-gateway.labels" . | nindent 4 }}
    {{- if .Values.ltm_route_labels }}
    {{- toYaml .Values.ltm_route_labels | nindent 4 }}
    {{- end }}
  {{- if .Values.ltm_route_annotations }}
  annotations:
    {{- toYaml .Values.ltm_route_annotations | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ltm_route_hostname }}
  host: {{ .Values.ltm_route_hostname }}
  {{- end }}
  to:
    kind: Service
    name: {{ .Values.name }}
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
  wildcardPolicy: None
{{- end }}
