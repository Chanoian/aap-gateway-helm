{{- /* ── Required field enforcement ──────────────────────────────────────── */}}
{{- if not .Values.namespace }}{{- fail "namespace is required and must not be empty" }}{{- end }}

{{- /* ── Build top-level spec dict ──────────────────────────────────────────
     Only emit fields that are explicitly non-default so the rendered CR
     stays minimal and matches what the operator would produce itself.
*/}}
{{- $spec := dict -}}
{{- if .Values.hostname }}{{- $_ := set $spec "hostname" .Values.hostname }}{{- end }}

{{- /* no_log: always emit — chart default (true) differs from operator default (false),
     so both true and false must reach the CR to honour the user's intent.
     idle_aap: only emit when true — false is the operator default, omitting it keeps
     the CR minimal. Explicit `idle_aap: false` in values has no effect by design. */}}
{{- $_ := set $spec "no_log" .Values.no_log }}
{{- if .Values.idle_aap }}{{- $_ := set $spec "idle_aap" .Values.idle_aap }}{{- end }}
{{- if .Values.redis_mode }}{{- $_ := set $spec "redis_mode" .Values.redis_mode }}{{- end }}
{{- if .Values.route_tls_termination_mechanism }}
  {{- $_ := set $spec "route_tls_termination_mechanism" .Values.route_tls_termination_mechanism }}
{{- end }}
{{- if and .Values.image_pull_policy (ne .Values.image_pull_policy "IfNotPresent") }}
  {{- $_ := set $spec "image_pull_policy" .Values.image_pull_policy }}
{{- end }}
{{- if ne (int .Values.loadbalancer_port) 443 }}
  {{- $_ := set $spec "loadbalancer_port" .Values.loadbalancer_port }}
{{- end }}
{{- if and .Values.loadbalancer_protocol (ne .Values.loadbalancer_protocol "https") }}
  {{- $_ := set $spec "loadbalancer_protocol" .Values.loadbalancer_protocol }}
{{- end }}

{{- /* ── Optional scalar fields (omit when empty) ─────────────────────────── */}}
{{- $optionalStrings := dict
    "admin_password_secret"        .Values.admin_password_secret
    "bundle_cacert_secret"         .Values.bundle_cacert_secret
    "db_fields_encryption_secret"  .Values.db_fields_encryption_secret
    "image"                        .Values.image
    "image_version"                .Values.image_version
    "postgres_image"               .Values.postgres_image
    "postgres_image_version"       .Values.postgres_image_version
    "redis_image"                  .Values.redis_image
    "redis_image_version"          .Values.redis_image_version
    "redhat_registry"              .Values.redhat_registry
    "redhat_registry_ns"           .Values.redhat_registry_ns
    "public_base_url"              .Values.public_base_url
    "route_host"                   .Values.route_host
    "route_tls_secret"             .Values.route_tls_secret
    "ingress_type"                 .Values.ingress_type
    "ingress_class_name"           .Values.ingress_class_name
    "ingress_path"                 .Values.ingress_path
    "ingress_path_type"            .Values.ingress_path_type
    "ingress_tls_secret"           .Values.ingress_tls_secret
    "service_type"                 .Values.service_type
-}}
{{- range $k, $v := $optionalStrings }}
  {{- if $v }}{{- $_ := set $spec $k $v }}{{- end }}
{{- end }}

{{- /* ── Optional map fields — CRD declares these as type:string, so serialize to JSON ── */}}
{{- if .Values.route_annotations }}
  {{- $_ := set $spec "route_annotations" (.Values.route_annotations | toJson) }}
{{- end }}
{{- if .Values.ingress_annotations }}
  {{- $_ := set $spec "ingress_annotations" (.Values.ingress_annotations | toJson) }}
{{- end }}
{{- if .Values.service_annotations }}
  {{- $_ := set $spec "service_annotations" (.Values.service_annotations | toJson) }}
{{- end }}
{{- if .Values.service_account_annotations }}
  {{- $_ := set $spec "service_account_annotations" (.Values.service_account_annotations | toJson) }}
{{- end }}
{{- if .Values.feature_flags }}
  {{- $_ := set $spec "feature_flags" .Values.feature_flags }}
{{- end }}

{{- /* ── Optional list fields (omit when empty) ────────────────────────────── */}}
{{- if .Values.image_pull_secrets }}
  {{- $_ := set $spec "image_pull_secrets" .Values.image_pull_secrets }}
{{- end }}
{{- if .Values.extra_settings }}
  {{- $_ := set $spec "extra_settings" .Values.extra_settings }}
{{- end }}

{{- /* ── api sub-spec ─────────────────────────────────────────────────────── */}}
{{- $api := dict
    "replicas"  .Values.api.replicas
    "log_level" (.Values.api.log_level | default "INFO")
-}}
{{- $apiRR := include "aap-gateway.resourceRequirements" .Values.api.resource_requirements | fromYaml }}
{{- if gt (len $apiRR) 0 }}{{- $_ := set $api "resource_requirements" $apiRR }}{{- end }}
{{- if .Values.api.node_selector }}{{- $_ := set $api "node_selector" .Values.api.node_selector }}{{- end }}
{{- if .Values.api.tolerations }}{{- $_ := set $api "tolerations" .Values.api.tolerations }}{{- end }}
{{- if .Values.api.topology_spread_constraints }}{{- $_ := set $api "topology_spread_constraints" .Values.api.topology_spread_constraints }}{{- end }}
{{- if .Values.api.strategy }}{{- $_ := set $api "strategy" .Values.api.strategy }}{{- end }}
{{- $_ := set $spec "api" $api }}

{{- /* ── database sub-spec — only emit non-false booleans and set strings ─── */}}
{{- $db := dict }}
{{- if .Values.database.postgres_data_volume_init }}{{- $_ := set $db "postgres_data_volume_init" true }}{{- end }}
{{- if .Values.database.postgres_keep_pvc_after_upgrade }}{{- $_ := set $db "postgres_keep_pvc_after_upgrade" true }}{{- end }}
{{- if .Values.database.idle_disabled }}{{- $_ := set $db "idle_disabled" true }}{{- end }}
{{- $dbOptStrings := dict
    "database_secret"                  .Values.database.database_secret
    "postgres_storage_class"           .Values.database.postgres_storage_class
    "postgres_ssl_mode"                .Values.database.postgres_ssl_mode
    "postgres_init_container_commands" .Values.database.postgres_init_container_commands
    "priority_class"                   .Values.database.priority_class
-}}
{{- range $k, $v := $dbOptStrings }}
  {{- if $v }}{{- $_ := set $db $k $v }}{{- end }}
{{- end }}
{{- if .Values.database.postgres_extra_settings }}
  {{- $_ := set $db "postgres_extra_settings" .Values.database.postgres_extra_settings }}
{{- end }}
{{- $dbRR := include "aap-gateway.resourceRequirements" .Values.database.resource_requirements | fromYaml }}
{{- if gt (len $dbRR) 0 }}{{- $_ := set $db "resource_requirements" $dbRR }}{{- end }}
{{- $dbSR := include "aap-gateway.storageRequirements" .Values.database.storage_requirements | fromYaml }}
{{- if gt (len $dbSR) 0 }}{{- $_ := set $db "storage_requirements" $dbSR }}{{- end }}
{{- if .Values.database.node_selector }}{{- $_ := set $db "node_selector" .Values.database.node_selector }}{{- end }}
{{- if .Values.database.tolerations }}{{- $_ := set $db "tolerations" .Values.database.tolerations }}{{- end }}
{{- if gt (len $db) 0 }}{{- $_ := set $spec "database" $db }}{{- end }}

{{- /* ── redis sub-spec — omit if only defaults ────────────────────────────── */}}
{{- $redis := dict }}
{{- if .Values.redis.redis_secret }}{{- $_ := set $redis "redis_secret" .Values.redis.redis_secret }}{{- end }}
{{- if .Values.redis.eda_redis_secret }}{{- $_ := set $redis "eda_redis_secret" .Values.redis.eda_redis_secret }}{{- end }}
{{- if ne (int .Values.redis.replicas) 1 }}
  {{- $_ := set $redis "replicas" .Values.redis.replicas }}
{{- end }}
{{- $redisRR := include "aap-gateway.resourceRequirements" .Values.redis.resource_requirements | fromYaml }}
{{- if gt (len $redisRR) 0 }}{{- $_ := set $redis "resource_requirements" $redisRR }}{{- end }}
{{- if .Values.redis.node_selector }}{{- $_ := set $redis "node_selector" .Values.redis.node_selector }}{{- end }}
{{- if .Values.redis.tolerations }}{{- $_ := set $redis "tolerations" .Values.redis.tolerations }}{{- end }}
{{- if gt (len $redis) 0 }}{{- $_ := set $spec "redis" $redis }}{{- end }}

{{- /* ── component pass-through helper ────────────────────────────────────────
     Emits disabled:false when the component is enabled (so the operator sees
     an explicit enable signal). Passes through all other non-empty values,
     including false booleans and zero integers, which plain `if $v` drops.
*/}}

{{- /* ── controller ────────────────────────────────────────────────────────── */}}
{{- $ctrl := dict }}
{{- $_ := set $ctrl "disabled" .Values.controller.disabled }}
{{- range $k, $v := .Values.controller }}
  {{- if ne $k "disabled" }}
    {{- if or $v (kindIs "bool" $v) (kindIs "float64" $v) (kindIs "int64" $v) }}
      {{- $_ := set $ctrl $k $v }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if gt (len $ctrl) 0 }}{{- $_ := set $spec "controller" $ctrl }}{{- end }}

{{- /* ── eda ────────────────────────────────────────────────────────────────── */}}
{{- $eda := dict }}
{{- $_ := set $eda "disabled" .Values.eda.disabled }}
{{- range $k, $v := .Values.eda }}
  {{- if ne $k "disabled" }}
    {{- if or $v (kindIs "bool" $v) (kindIs "float64" $v) (kindIs "int64" $v) }}
      {{- $_ := set $eda $k $v }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if gt (len $eda) 0 }}{{- $_ := set $spec "eda" $eda }}{{- end }}

{{- /* ── hub ────────────────────────────────────────────────────────────────── */}}
{{- $hub := dict }}
{{- $_ := set $hub "disabled" .Values.hub.disabled }}
{{- range $k, $v := .Values.hub }}
  {{- if and (ne $k "disabled") (ne $k "content") (ne $k "worker") }}
    {{- if or $v (kindIs "bool" $v) (kindIs "float64" $v) (kindIs "int64" $v) }}
      {{- $_ := set $hub $k $v }}
    {{- end }}
  {{- end }}
{{- end }}
{{- $content := dict }}
{{- range $k, $v := .Values.hub.content }}
  {{- if or $v (kindIs "bool" $v) (kindIs "float64" $v) (kindIs "int64" $v) }}
    {{- if not (and (eq $k "replicas") (eq (int $v) 2)) }}
      {{- $_ := set $content $k $v }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if gt (len $content) 0 }}{{- $_ := set $hub "content" $content }}{{- end }}
{{- $worker := dict }}
{{- range $k, $v := .Values.hub.worker }}
  {{- if or $v (kindIs "bool" $v) (kindIs "float64" $v) (kindIs "int64" $v) }}
    {{- if not (and (eq $k "replicas") (eq (int $v) 2)) }}
      {{- $_ := set $worker $k $v }}
    {{- end }}
  {{- end }}
{{- end }}
{{- if gt (len $worker) 0 }}{{- $_ := set $hub "worker" $worker }}{{- end }}
{{- if gt (len $hub) 0 }}{{- $_ := set $spec "hub" $hub }}{{- end }}

{{- /* ── top-level extraSpec override (deep merge) ────────────────────────────
     Uses aap-gateway.deepMerge so extraSpec.api.strategy merges into the
     rendered api block rather than replacing it entirely.
*/}}
{{- if .Values.extraSpec }}
  {{- $_ := include "aap-gateway.deepMerge" (list $spec .Values.extraSpec) | fromYaml }}
{{- end }}
---
apiVersion: aap.ansible.com/v1alpha1
kind: AnsibleAutomationPlatform
metadata:
  name: {{ .Values.name | default "aap" }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "aap-gateway.labels" . | nindent 4 }}
spec:
  {{- toYaml $spec | nindent 2 }}
