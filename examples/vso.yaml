# ── VSO (Vault Secrets Operator) secret provider ──────────────────────────────
# Demonstrates pulling AAP secrets from HashiCorp Vault via VSO.
# Prerequisites:
#   - VSO installed in the cluster (secrets.hashicorp.com CRDs present)
#   - A Vault server reachable from the cluster
#   - An AppRole configured in Vault with a K8s Secret holding the secret_id (key: `id`)
#
# VSO will create the K8s Secrets named below; AAP reads them by those names.
# Each VaultStaticSecret maps:
#   mount  — the KV engine mount point in Vault (e.g. "secret", "kvv2")
#   path   — the path within that mount, no "data/" prefix (e.g. "aap/admin")

name: aap
namespace: aap

no_log: true

# AAP secret names — VSO will create K8s Secrets with these exact names.
admin_password_secret: aap-admin-password
db_fields_encryption_secret: aap-gateway-fernet-key
database:
  database_secret: aap-db-credentials
controller:
  postgres_configuration_secret: aap-controller-db-credentials
eda:
  db_fields_encryption_secret: aap-eda-fernet-key
  database:
    database_secret: aap-eda-db-credentials

secretProvider:
  type: vso

  vso:
    # ── VaultConnection ──────────────────────────────────────────────────────
    connection:
      address: https://vault.example.com:8200
      # vaultNamespace: admin   # uncomment for HCP Vault or Vault Enterprise namespaces
      skipTLSVerify: false
      # caCertSecretRef: vault-ca-cert   # uncomment to provide a custom CA cert (K8s Secret with key ca.crt)

    # ── VaultAuth — AppRole auth ─────────────────────────────────────────────
    auth:
      appRole:
        roleId: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
        secretRef: aap-approle-secret   # K8s Secret with key `id` containing the secret_id
        mount: approle

    # ── KV engine config ─────────────────────────────────────────────────────
    kvVersion: v2
    refreshAfter: 1h

    # ── Secrets (opt-in) ─────────────────────────────────────────────────────
    # Only secrets with a non-empty mount+path are rendered.
    # The destination K8s Secret name comes from the AAP field above.
    secrets:
      admin_password_secret:
        mount: secret
        path: aap/admin
      db_fields_encryption_secret:
        mount: secret
        path: aap/gateway-fernet
      database_secret:
        mount: secret
        path: aap/gateway-db
      controller_postgres_configuration_secret:
        mount: secret
        path: aap/controller-db
      eda_db_fields_encryption_secret:
        mount: secret
        path: aap/eda-fernet
      eda_database_secret:
        mount: secret
        path: aap/eda-db
