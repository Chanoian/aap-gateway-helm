# ── Full stack — Controller + Hub + EDA ───────────────────────────────────────
# All components enabled with internal database and Redis.
# Good for: production deployments on OpenShift with CephFS storage.

name: aap
namespace: aap
hostname: aap.apps.cluster.example.com

no_log: true

controller:
  disabled: false

eda:
  disabled: false

hub:
  disabled: false
  file_storage_storage_class: ocs-external-storagecluster-cephfs
  file_storage_size: 100Gi
  file_storage_access_mode: ReadWriteMany
