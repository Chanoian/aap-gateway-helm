# ── LTM Route — site-local fixed entry point ───────────────────────────────────
# Deploys an OpenShift Route pointing to the local AAP service.
# Intended for active-passive site designs where the operator-managed route
# acts as GTM (moves between sites) and this route is the fixed LTM entry point.
#
# With hostname (site-specific FQDN):
#   ltm_route_hostname: aap-ltm.apps.site-a.example.com
#
# Without hostname: OpenShift auto-generates one.

name: aap
namespace: aap

ltm_route_enabled: true
ltm_route_hostname: aap-ltm.apps.site-a.example.com
ltm_route_annotations:
  haproxy.router.openshift.io/timeout: 30s
  haproxy.router.openshift.io/balance: roundrobin
ltm_route_labels:
  app.kubernetes.io/part-of: aap
  site: site-a
