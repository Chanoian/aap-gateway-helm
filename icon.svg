<svg width="512" height="512" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AAP Gateway Helm Chart Icon</title>
  <desc id="desc">A stylized helm wheel around an automation gateway with connected platform nodes, representing the aap-gateway Helm chart for OpenShift.</desc>
  <defs>
    <linearGradient id="bg" x1="44" y1="36" x2="210" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="ring" x1="64" y1="56" x2="192" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.55" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#FB7185"/>
    </linearGradient>
    <linearGradient id="gate" x1="91" y1="88" x2="165" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(128 126) rotate(90) scale(100)">
      <stop stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="20" y="20" width="216" height="216" rx="52" fill="url(#bg)"/>
  <rect x="20" y="20" width="216" height="216" rx="52" fill="url(#glow)"/>

