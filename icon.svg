    <path d="M185.98 70.02L170.42 85.58" stroke="url(#ring)" stroke-width="10" stroke-linecap="round"/>
    <path d="M85.58 170.42L70.02 185.98" stroke="url(#ring)" stroke-width="10" stroke-linecap="round"/>
